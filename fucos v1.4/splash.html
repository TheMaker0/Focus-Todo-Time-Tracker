<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Focus App Loading</title>
<style>
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0e0f13;
    color: #f0eee8;
    font-family: 'Lato', sans-serif;
  }
  .card {
    width: 460px;
    padding: 32px 30px;
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(20,22,30,0.95);
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    text-align: center;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    letter-spacing: -1px;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .logo span {
    color: #4ecca3;
  }
  .subtitle {
    color: #b5b7c5;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .spinner {
    width: 82px;
    height: 82px;
    margin: 0 auto 24px;
    border: 8px solid rgba(255,255,255,0.08);
    border-top-color: #4ecca3;
    border-radius: 50%;
    animation: spin 1.1s linear infinite;
  }
  .loading {
    font-size: 14px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: #9fa2b2;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Focus<span>.</span></div>
    <div class="subtitle">Loading your task workspace…</div>
    <div class="spinner"></div>
    <div class="loading">Starting app. Please wait.</div>
  </div>
</body>
</html>
